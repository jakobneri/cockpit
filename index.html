<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nerifeige.de Cockpit</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="background-effects">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="glow glow-3"></div>
    </div>

    <div class="app-container">
      <header>
        <h1 id="header-hostname">nerifeige.de hub</h1>
        <div class="status-container">
          <div class="heartbeat" id="heartbeat-dot"></div>
          <p class="subtitle" id="os-info">Loading System Info...</p>
        </div>
      </header>

      <div id="view-overview" class="view">
        <div class="nodes-grid" id="nodes-container">
          <!-- Multi-node cards will appear here -->
        </div>
      </div>

      <main id="view-details" class="view" style="display: none;">
        <button class="back-btn" onclick="showOverview()">
          <span>←</span> Back to Fleet
        </button>

        <!-- Big Box Stats -->
        <section class="card glass">
          <div class="metrics-big-box">
            <!-- CPU -->
            <div class="big-metric">
              <div class="metric-header">
                <span class="label">CPU Usage</span>
                <div><span class="value" id="cpu-load">--</span><span class="unit">%</span></div>
              </div>
              <div class="chart-container"><canvas id="cpuChart"></canvas></div>
              <span class="detail">System Load</span> 
            </div>

            <!-- RAM -->
            <div class="big-metric">
              <div class="metric-header">
                <span class="label">Memory</span>
                <div><span class="value" id="ram-usage">--</span><span class="unit">%</span></div>
              </div>
              <div class="chart-container"><canvas id="ramChart"></canvas></div>
              <span class="detail" id="ram-detail">-- / -- GB</span>
            </div>

            <!-- Network Combined -->
            <div class="big-metric net-metric">
              <div class="metric-header">
                <span class="label">Network Activity (Tx: <span id="net-tx">0</span> / Rx: <span id="net-rx">0</span> KB/s)</span>
              </div>
              <div class="chart-container"><canvas id="netChart"></canvas></div>
              <span class="detail">Realtime Traffic</span>
            </div>
          </div>

          <!-- Storage Section Simplified -->
          <h3><span class="icon">💾</span> Storage</h3>
          <div class="storage-grid">
            <div class="storage-item">
              <div class="storage-header">
                <span class="storage-name">Root Partition (/)</span>
                <span class="storage-percent" id="root-percent">--%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="root-bar"></div></div>
              <span class="detail" id="root-detail">-- / -- GB</span>
            </div>

            <div class="storage-item">
              <div class="storage-header">
                <span class="storage-name" id="smb-name">SMB Drive</span>
                <span class="storage-percent" id="smb-percent">--%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="smb-bar"></div></div>
              <span class="detail" id="smb-detail">Not Mounted</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal">
      <div class="modal-content glass">
        <div class="modal-header">
          <h2 id="modalTitle">Service Logs</h2>
          <span class="close-btn" onclick="closeLogs()">&times;</span>
        </div>
        <div class="modal-body">
          <pre id="modalLogsText">Loading logs...</pre>
        </div>
      </div>
    </div>
      <footer>
        <p>nerifeige.de hub <span class="version-tag">v3.2.0</span></p>
      </footer>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
